# WireForge 配对串口 TestPlan 模版 — 单条 pairing（mock://auto / 真机）
#
# 全量 pairing 由脚本生成:
#   python3 scripts/generate_pair_serial_plans.py
#   → database/runs/csg_pair_serial.yaml
#   → database/runs/dlt645_pair_serial.yaml
#
# 编排校验: test.validate → test.dry_run
# 执行: exec_test.run(file, options.vars.port=...)

version: 1
name: pair_serial_csg_init_archive
timeout_ms: 120000

purpose: |
  CSG 档案初始化下行 → 上行 AFN00 确认（单条 pairing 示例）。

expected_results:
  - step_id: afn01_init_archive__wait_0
    description: 收到 AFN00 确认帧
    expect:
      afn: "00"
      di: E8010001
      dir: uplink

test_flow:
  - serial.connect
  - build 下行 / build 上行 mock 帧
  - mock://auto 时 auto_rule.add
  - send(timeout:0) + wait-frame + assert
  - auto_rule.remove + disconnect

vars:
  port: mock://auto
  conn: pair_test
  baudrate: 9600
  proto: csg
  wait_timeout_ms: 5000

setup:
  - id: connect
    action: serial.connect
    args:
      conn: ${conn}
      port: ${port}
      baudrate: ${baudrate}

steps:
  - id: afn01_init_archive__build_req
    action: build
    args:
      proto: ${proto}
      afn: "0x01"
      di: E8020102
      dir: downlink
    save_as: afn01_init_archive_req

  - id: afn01_init_archive__build_resp_0
    action: build
    args:
      proto: ${proto}
      afn: "0x00"
      di: E8010001
      dir: uplink
      wait_time: 0
    save_as: afn01_init_archive_resp_0

  - id: afn01_init_archive__mock_setup
    action: if
    args:
      when: port == mock://auto
    steps:
      - id: afn01_init_archive__add_rule
        action: auto_rule.add
        args:
          id: rule_afn01_init_archive
          source: serial:${conn}
          match:
            di: E8020102
            afn: "01"
            dir: downlink
          then:
            - command: /send
              args:
                hex: ${afn01_init_archive_resp_0.frame_hex}

  - id: afn01_init_archive__send
    action: send
    args:
      conn: ${conn}
      hex: ${afn01_init_archive_req.frame_hex}
      timeout: 0

  - id: afn01_init_archive__wait_0
    action: wait-frame
    args:
      conn: ${conn}
      proto: ${proto}
      timeout_ms: ${wait_timeout_ms}
      expect:
        afn: "00"
        di: E8010001
        dir: uplink
    save_as: afn01_init_archive_ack_0

  - id: afn01_init_archive__assert_0
    action: assert
    args:
      expect:
        afn01_init_archive_ack_0.matched: true

  - id: afn01_init_archive__mock_teardown
    action: if
    args:
      when: port == mock://auto
    steps:
      - id: afn01_init_archive__remove_rule
        action: auto_rule.remove
        args:
          id: rule_afn01_init_archive

teardown:
  - id: disconnect
    action: serial.disconnect
    args:
      conn: ${conn}
