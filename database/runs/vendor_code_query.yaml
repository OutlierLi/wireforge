version: 1
name: vendor_code_query
timeout_ms: 60000

setup:
  - id: connect_cco
    action: serial.connect
    args:
      conn: "cco"
      port: "virtual://lab"
      baudrate: 9600

  - id: connect_sta
    action: serial.connect
    args:
      conn: "sta"
      port: "virtual://lab"
      baudrate: 9600

steps:
  - id: build_query
    action: build
    args:
      proto: "csg"
      afn: "0x03"
      di: "E8000301"
      dir: downlink
    save_as: query

  - id: build_resp
    action: build
    args:
      proto: "csg"
      afn: "0x03"
      di: "E8000301"
      dir: uplink
      vendor_code: "AB"
      chip_code: "CD"
      version_date.year: "26"
      version_date.month: "06"
      version_date.day: "28"
      version: "01"
    save_as: resp

  - id: cco_send_query
    action: send
    args:
      conn: "cco"
      hex: "${query.frame_hex}"
      timeout: 1

  - id: sta_send_resp
    action: send
    args:
      conn: "sta"
      hex: "${resp.frame_hex}"
      timeout: 0.5

  - id: cco_wait_frame
    action: wait-frame
    args:
      conn: "cco"
      proto: "csg"
      timeout_ms: 5000
      expect:
        afn: "03"
        di: "E8000301"
        dir: uplink
    save_as: waited

  - id: assert_frame_hex
    action: assert
    args:
      expect:
        waited.frame_hex: "${resp.frame_hex}"

  - id: decode_frame
    action: decode
    args:
      proto: "csg"
      hex: "${waited.frame_hex}"
    save_as: decoded

  - id: assert_protocol
    action: assert
    args:
      expect:
        decoded.protocol: "csg_2016"

teardown:
  - id: disconnect_cco
    action: serial.disconnect
    args:
      conn: "cco"

  - id: disconnect_sta
    action: serial.disconnect
    args:
      conn: "sta"