# WireForge TestPlan — 覆盖所有支持的动作类型
# 用法: /run --file=tests/all_actions.yaml --timeout=60000
#
# 虚拟总线规则: 同一 virtual://name 的不同客户端，写入的数据
# 会出现在其他客户端的读缓冲区。自己的写入不会回显。

version: 1
name: all_actions_coverage
vars:
  cco: "cco"
  sta: "sta"
  proto: "csg"
  baudrate: 9600
  timeout_ms: 5000

# ── setup ──
setup:
  - id: connect_cco
    action: serial.connect
    args:
      conn: "${cco}"
      port: "virtual://cov"
      baudrate: "${baudrate}"

  - id: connect_sta
    action: serial.connect
    args:
      conn: "${sta}"
      port: "virtual://cov"
      baudrate: "${baudrate}"

# ── steps ──
steps:
  # ── build — 构造查询厂商代码帧 ──
  - id: build_query
    action: build
    args:
      proto: "${proto}"
      afn: "0x03"
      di: "E8000301"
      dir: downlink
    save_as: query_frame

  # ── build — 构造查询厂商响应 ──
  - id: build_resp
    action: build
    args:
      proto: "${proto}"
      afn: "0x03"
      di: "E8000301"
      dir: uplink
      vendor_code: "AB"
      chip_code: "CD"
      version_date.year: "25"
      version_date.month: "06"
      version_date.day: "28"
      version: "01"
    save_as: resp_frame

  # ── assert — 验证构建结果 ──
  - id: assert_frame
    action: assert
    args:
      expect:
        query_frame.frame_hex: "68 0C 00 40 03 01 01 03 00 E8 30 16"

  # ── send (CCO→总线，立即读完) — CCO 发送查询帧，此时总线无响应 ──
  - id: cco_send
    action: send
    args:
      conn: "${cco}"
      hex: "${query_frame.frame_hex}"
      timeout: 1

  # ── auto_rule.add — 添加自动回复规则 ──
  - id: add_rule
    action: auto_rule.add
    args:
      id: "test_rule_cov"
      match: "68..16"
      source: "serial:${sta}"
      then: "reply_with_ack"

  # ── sleep — 短暂等待 ──
  - id: pause1
    action: sleep
    args:
      ms: 100

  # ── send (STA→总线，不等待) — STA 发送响应帧到总线，CCO 端可收到 ──
  - id: sta_send
    action: send
    args:
      conn: "${sta}"
      hex: "${resp_frame.frame_hex}"
      timeout: 0.5

  # ── wait-frame — CCO 端监听来自 STA 的响应 ──
  - id: wait_resp
    action: wait-frame
    args:
      conn: "${cco}"
      proto: "${proto}"
      timeout_ms: "${timeout_ms}"
      expect:
        afn: "03"
        di: "E8000301"
        dir: uplink
    save_as: waited

  # ── assert — 验证 wait-frame 结果 ──
  - id: assert_waited
    action: assert
    args:
      expect:
        waited.frame_hex: "${resp_frame.frame_hex}"

  # ── decode — 解码收到的帧 ──
  - id: decode_resp
    action: decode
    args:
      proto: "${proto}"
      hex: "${waited.frame_hex}"
    save_as: decoded

  # ── assert — 验证解码结果包含协议名和路径 ──
  - id: assert_decode
    action: assert
    args:
      expect:
        decoded.protocol: csg_2016

  # ── request (自动化原语) — 构造+发送+等待 ──
  # 注意: request 读取前需要先由 STA 写入响应
  - id: sta_preload
    action: send
    args:
      conn: "${sta}"
      hex: "${resp_frame.frame_hex}"
      timeout: 0.5

  - id: request_test
    action: request
    args:
      conn: "${cco}"
      proto: "${proto}"
      timeout_ms: "${timeout_ms}"
      build:
        proto: "${proto}"
        afn: "0x03"
        di: "E8000301"
        dir: downlink
      wait:
        afn: "03"
        di: "E8000301"
        dir: uplink
    save_as: req

  # ── assert ──
  - id: assert_req
    action: assert
    args:
      expect:
        req.response.frame_hex: "${resp_frame.frame_hex}"

  # ── set_var ──
  - id: store
    action: set_var
    args:
      name: final_status
      value: all_passed

  # ── assert ──
  - id: assert_var
    action: assert
    args:
      expect:
        final_status: all_passed

  # ── sleep ──
  - id: final_sleep
    action: sleep
    args:
      ms: 50

# ── teardown ──
teardown:
  - id: remove_rule
    action: auto_rule.remove
    args:
      id: "test_rule_cov"

  - id: close_cco
    action: serial.disconnect
    args:
      conn: "${cco}"

  - id: close_sta
    action: serial.disconnect
    args:
      conn: "${sta}"
