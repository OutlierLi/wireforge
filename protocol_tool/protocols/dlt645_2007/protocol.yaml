# DL/T 645-2007 协议包入口和路由声明
id: dlt645_2007
name: DL/T 645-2007
version: "2007"

frame_ref: frame.yaml

sources:
  messages: "messages/**/*.yaml"
  variants: "variants/**/*.yaml"
  types: "types/**/*.yaml"

routers:
  main:
    kind: frame_router
    keys:
      - control.func
      - control.dir
    target_kind: message
    fallback: raw

  read_data_response_di:
    kind: variant_router
    selector_field: di
    target_kind: variant
    fallback: raw

build:
  default_frame: dlt645_2007.frame

policies:
  unknown_message: preserve_payload
  unknown_variant: raw
  strict_route_uniqueness: true
