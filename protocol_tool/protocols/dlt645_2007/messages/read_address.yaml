# DL/T 645-2007 读通信地址报文 (control.func=0x13)
# 协议 7.4.1: 主站请求帧 — 地址域=AA...AAH, 控制码=13H, 数据域长度 L=00H (无数据域)
# 协议 7.4.2: 从站应答帧 — 控制码=93H, 数据域长度 L=06H, 数据域=通信地址(6字节BCD)
messages:
  - kind: message
    id: read_address_request
    router: main
    match:
      control.func: 0x13
      control.dir: 0
    direction: request
    description: "读通信地址 — 数据域长度 L=00H (无数据域)"
    body:
      type: struct
      fields: []

  - kind: message
    id: read_address_response
    router: main
    match:
      control.func: 0x13
      control.dir: 1
    direction: response
    description: "读通信地址应答 — 数据域=通信地址(6字节BCD, L=06H)"
    body:
      type: struct
      fields:
        - name: address_data
          type: bcd
          length: 6
          byte_order: little
          canonical_format: decimal_string
          description: "通信地址"
