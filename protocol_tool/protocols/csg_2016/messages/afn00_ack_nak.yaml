# CSG 2016 AFN=00 — 确认/否认
messages:
  - kind: message
    id: afn00_ack
    router: main
    match:
      control.func: 0x00
    direction: request
    body:
      type: struct
      fields:
        - name: afn
          type: uint8
          description: "应用功能码AFN"

        - name: seq
          type: uint8
          description: "帧序列号SEQ"

        - name: di
          type: hex
          length: 4
          description: "数据单元标识"

        - name: payload
          type: routed_payload
          router: afn_di_router
          boundary:
            kind: remaining
